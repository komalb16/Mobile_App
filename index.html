<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Demo App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#14141f;--border:#1f1f30;
  --accent:#00e5ff;--accent2:#7c3aed;--text:#e8e8f8;--muted:#6b6b88;
  --ok:#00c97a;--warn:#f59e0b;--err:#ff4f6d;--r:14px;
}
html{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif}
body{min-height:100vh;display:flex;flex-direction:column}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 15% 10%,rgba(0,229,255,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 80%,rgba(124,58,237,.08) 0%,transparent 55%);
}
header{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 40px;border-bottom:1px solid var(--border);
  background:rgba(13,13,20,.8);backdrop-filter:blur(20px);
}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.brand-name{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.brand-ver{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px}
.pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%}
.dot.up{background:var(--ok);box-shadow:0 0 8px var(--ok)}
.dot.down{background:var(--err)}
main{position:relative;z-index:10;display:grid;grid-template-columns:280px 1fr;gap:24px;max-width:1100px;width:100%;margin:0 auto;padding:36px 24px;flex:1}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:0}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--accent);text-transform:uppercase;margin-bottom:18px}
.stat-block{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--border)}
.stat-block:last-child{border-bottom:none}
.stat-icon{font-size:22px;width:36px;text-align:center}
.stat-val{font-size:22px;font-weight:800;line-height:1}
.stat-key{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-row span:first-child{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px}
.info-row span:last-child{font-weight:600}
.panel{display:flex;flex-direction:column;gap:20px}
.input-row{display:flex;gap:10px}
.input-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s}
.input-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.1)}
.btn{padding:12px 22px;border:none;border-radius:10px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;transition:transform .15s,opacity .2s;white-space:nowrap}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.task-list{display:flex;flex-direction:column;gap:10px}
.task-item{display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 18px;animation:rise .3s ease both;transition:border-color .2s}
.task-item:hover{border-color:rgba(0,229,255,.2)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.task-status{flex-shrink:0;padding:4px 10px;border-radius:999px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.5px;font-weight:500}
.status-done{background:rgba(0,201,122,.12);color:var(--ok)}
.status-in-progress{background:rgba(245,158,11,.12);color:var(--warn)}
.status-todo{background:rgba(107,107,136,.12);color:var(--muted)}
.task-title{flex:1;font-size:14px;font-weight:600}
.task-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.task-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px;transition:color .2s,background .2s}
.task-del:hover{color:var(--err);background:rgba(255,79,109,.1)}
.empty{text-align:center;padding:48px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px}
.empty-icon{font-size:48px;margin-bottom:12px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;transition:all .2s}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.08)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 22px;font-family:'DM Mono',monospace;font-size:13px;z-index:999;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
footer{text-align:center;padding:20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);border-top:1px solid var(--border);position:relative;z-index:10}
@media(max-width:700px){header{padding:20px}main{grid-template-columns:1fr;padding:20px 16px}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div>
      <div class="brand-name">Demo App</div>
      <div class="brand-ver">v1.0.0 · Spring Boot</div>
    </div>
  </div>
  <div class="pill">
    <div class="dot up" id="status-dot"></div>
    <span id="status-text">checking…</span>
  </div>
</header>

<main>
  <aside style="display:flex;flex-direction:column;gap:16px">
    <div class="card">
      <div class="card-label">📊 Stats</div>
      <div class="stat-block"><div class="stat-icon">📋</div><div><div class="stat-val" id="stat-total">—</div><div class="stat-key">Total Tasks</div></div></div>
      <div class="stat-block"><div class="stat-icon">✅</div><div><div class="stat-val" id="stat-done">—</div><div class="stat-key">Done</div></div></div>
      <div class="stat-block"><div class="stat-icon">⚡</div><div><div class="stat-val" id="stat-prog">—</div><div class="stat-key">In Progress</div></div></div>
      <div class="stat-block"><div class="stat-icon">🔲</div><div><div class="stat-val" id="stat-todo">—</div><div class="stat-key">To Do</div></div></div>
    </div>
    <div class="card">
      <div class="card-label">🖥 Server Info</div>
      <div id="info-rows"><div style="color:var(--muted);font-family:'DM Mono',monospace;font-size:12px">loading…</div></div>
    </div>
  </aside>

  <div class="panel">
    <div class="card">
      <div class="card-label">➕ Add Task</div>
      <div class="input-row">
        <input type="text" id="task-input" placeholder="What needs to be done?" onkeydown="if(event.key==='Enter')addTask()"/>
        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="card-label" style="margin:0">📋 Task Board</div>
        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('todo',this)">Todo</button>
          <button class="filter-btn" onclick="setFilter('in-progress',this)">Active</button>
          <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
        </div>
      </div>
      <div class="task-list" id="task-list">
        <div class="empty"><div class="empty-icon">⏳</div>Loading…</div>
      </div>
    </div>
  </div>
</main>

<footer>Running on ☕ Spring Boot 3 · Embedded Tomcat · Port 8080</footer>
<div id="toast"></div>

<script>
let allTasks=[], filter='all';

async function loadTasks(){
  try{const r=await fetch('/api/tasks');allTasks=await r.json();renderTasks();updateStats();}
  catch(e){showToast('⚠️ API unavailable');}
}
async function loadInfo(){
  try{
    const[health,info]=await Promise.all([fetch('/actuator/health').then(r=>r.json()),fetch('/api/info').then(r=>r.json())]);
    document.getElementById('status-dot').className='dot up';
    document.getElementById('status-text').textContent='online';
    document.getElementById('info-rows').innerHTML=[['App',info.app],['Version',info.version],['Java',info.java],['OS',info.os],['Status',health.status]]
      .map(([k,v])=>`<div class="info-row"><span>${k}</span><span>${v}</span></div>`).join('');
  }catch{document.getElementById('status-dot').className='dot down';document.getElementById('status-text').textContent='offline';}
}
async function addTask(){
  const input=document.getElementById('task-input'),title=input.value.trim();
  if(!title){input.focus();return;}
  try{
    const r=await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title})});
    if(r.ok){input.value='';loadTasks();showToast('✓ Task added');}
  }catch{showToast('⚠️ Failed to add');}
}
async function deleteTask(id){
  try{await fetch('/api/tasks/'+id,{method:'DELETE'});loadTasks();showToast('🗑 Task deleted');}
  catch{showToast('⚠️ Failed to delete');}
}
function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTasks();}
function renderTasks(){
  const list=document.getElementById('task-list');
  const tasks=filter==='all'?allTasks:allTasks.filter(t=>t.status===filter);
  if(!tasks.length){list.innerHTML='<div class="empty"><div class="empty-icon">🎉</div>No tasks here!</div>';return;}
  list.innerHTML=tasks.map((t,i)=>`
    <div class="task-item" style="animation-delay:${i*40}ms">
      <span class="task-status status-${t.status}">${t.status.replace('-',' ')}</span>
      <span class="task-title">${esc(t.title)}</span>
      <span class="task-id">#${t.id}</span>
      <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
    </div>`).join('');
}
function updateStats(){
  document.getElementById('stat-total').textContent=allTasks.length;
  document.getElementById('stat-done').textContent=allTasks.filter(t=>t.status==='done').length;
  document.getElementById('stat-prog').textContent=allTasks.filter(t=>t.status==='in-progress').length;
  document.getElementById('stat-todo').textContent=allTasks.filter(t=>t.status==='todo').length;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);}
loadInfo(); loadTasks();
</script>
</body>
</html>
